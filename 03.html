<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태극도 공지사항</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'k-bg': '#fdfbf7',
                        'k-text': '#1a1a1a',
                        'theme-color': '#be123c', // 다홍색 (Crimson)
                        'theme-light': '#ffe4e6', // 연한 다홍색 배경용
                        'stone-custom': '#57534e',
                    },
                    fontFamily: {
                        serif: ['"Noto Serif KR"', 'serif'],
                        sans: ['"Noto Sans KR"', 'sans-serif'],
                    },
                    backgroundImage: {
                        'hanji-pattern': 'radial-gradient(#e6e2d3 1px, transparent 1px)',
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* 기본 설정 */
        body { font-family: 'Noto Sans KR', sans-serif; }
        .break-keep { word-break: keep-all; }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse-custom {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(1.05); }
        }
        /* 게시물 스크롤 이동 시 반짝임 하이라이트 효과 (2초) */
        @keyframes highlightTarget {
            0% { border-color: inherit; box-shadow: none; }
            15% { border-color: #be123c; box-shadow: 0 0 0 5px rgba(190, 18, 60, 0.25); }
            85% { border-color: #be123c; box-shadow: 0 0 0 5px rgba(190, 18, 60, 0.25); }
            100% { border-color: inherit; box-shadow: none; }
        }

        .animate-slide-down { animation: slideDown 0.4s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        .animate-pulse-custom { animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        
        .highlight-target {
            animation: highlightTarget 2s ease-in-out forwards !important;
            position: relative;
            z-index: 10;
        }
        
        textarea { resize: none; }
        .shadow-custom { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.08); }
        
        /* 로딩 스피너 */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #be123c;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .search-highlight {
            background-color: #fef08a; 
            color: #1a1a1a; 
            padding: 0 2px; 
            border-radius: 2px; 
            font-weight: bold;
        }
    </style>

    <!-- Firebase SDK (Version 11.6.1) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseModules = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, signOut,
            getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, serverTimestamp
        };
        
        if (window.app && window.app.initFirebase) {
            window.app.initFirebase();
        }
    </script>
</head>
<body class="bg-k-bg bg-hanji-pattern bg-[length:24px_24px] text-k-text min-h-screen flex flex-col items-center py-8 px-4 relative">

    <!-- 홈 버튼 -->
    <button onclick="app.goHome()" class="fixed top-6 right-6 z-50 bg-white/90 backdrop-blur-sm border-2 border-stone-200 text-stone-600 hover:text-theme-color hover:border-theme-color hover:bg-theme-light rounded-full px-5 py-2.5 flex items-center gap-2 shadow-custom transition-all duration-300 font-bold text-sm md:text-base group font-sans">
        <i data-lucide="home" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
        <span class="hidden md:inline">홈으로</span>
    </button>

    <!-- 토스트 알림 컨테이너 -->
    <div id="toast-container"></div>

    <!-- 헤더 영역 -->
    <div class="w-full max-w-4xl relative mb-12 animate-fade-in text-center">
        <!-- 헤더 클릭 시 홈으로 이동 -->
        <header class="pt-4 cursor-pointer select-none inline-block" onclick="app.goHome()">
            <div class="flex items-center justify-center gap-3 mb-4">
                <i data-lucide="bell-ring" class="w-8 h-8 text-theme-color"></i>
                <h1 class="text-4xl md:text-5xl font-serif font-bold text-k-text tracking-wide break-keep">
                    太極道 공지사항
                </h1>
            </div>
            <!-- 테마 컬러 Divider -->
            <div class="w-16 h-1 bg-theme-color mx-auto rounded-full mb-4"></div>
            
            <p class="text-stone-500 font-sans text-base md:text-lg tracking-wider">
                도인 여러분께 중요한 소식을 전합니다
            </p>
        </header>
    </div>

    <!-- 메인 콘텐츠 영역 -->
    <main id="main-content" class="w-full max-w-4xl bg-white shadow-custom border border-stone-200 rounded-3xl min-h-[600px] flex flex-col transition-all duration-300 p-6 md:p-10 relative overflow-hidden">
        <!-- 초기 로딩 상태 -->
        <div id="initial-loader" class="absolute inset-0 flex items-center justify-center bg-white/95 z-10 rounded-3xl">
            <div class="flex flex-col items-center gap-4 p-6 text-center">
                <div class="loader w-10 h-10 border-4"></div>
                <p class="text-stone-500 font-sans text-base animate-pulse">소식을 불러오고 있습니다...</p>
            </div>
        </div>
        <!-- JS Render Target -->
    </main>

    <!-- 푸터 -->
    <footer class="mt-16 text-center pb-8 animate-fade-in">
        <button onclick="app.toggleAdmin()" class="group text-xs text-stone-400 hover:text-theme-color flex items-center justify-center gap-2 mx-auto transition-colors px-6 py-3 rounded-full hover:bg-white border border-transparent hover:border-stone-200 hover:shadow-sm">
            <span id="admin-icon-wrapper" class="transition-transform group-hover:scale-110"></span>
            <span id="admin-text" class="font-medium font-sans">관리자 모드</span>
        </button>
        <p class="text-[10px] text-stone-300 mt-4 font-sans tracking-widest uppercase">&copy; 2026 Taegukdo. All rights reserved.</p>
    </footer>

    <!-- 모달 컨테이너 -->
    <div id="modal-container" class="hidden fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4 transition-opacity duration-300" onclick="app.closeModal()">
        <div id="modal-content" class="bg-white w-full max-w-md rounded-2xl shadow-2xl border-2 border-white overflow-hidden transform transition-all scale-95 opacity-0" onclick="event.stopPropagation()">
            <!-- JS Render Target -->
        </div>
    </div>

    <!-- 플로팅 버튼 -->
    <div class="fixed bottom-8 right-8 z-50 flex flex-col gap-3 animate-fade-in">
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="p-3 bg-white border-2 border-theme-color/30 rounded-full shadow-custom text-theme-color hover:bg-theme-color hover:text-white hover:border-theme-color transition-all duration-300 group transform hover:-translate-y-1" aria-label="맨 위로">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
            </svg>
        </button>
        <button onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})" class="p-3 bg-white border-2 border-theme-color/30 rounded-full shadow-custom text-theme-color hover:bg-theme-color hover:text-white hover:border-theme-color transition-all duration-300 group transform hover:-translate-y-1" aria-label="맨 아래로">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
        </button>
    </div>

    <script>
        /**
         * Constants & State
         */
        const state = {
            isAdmin: false,
            viewMode: 'current',
            selectedPostId: null,
            modalType: null,
            deleteTargetId: null,
            editTargetId: null,
            posts: [],
            isLoading: true,
            user: null,
            auth: null,
            db: null,
            currentImageDataUrl: null,
            _initialScrollDone: false // 최우선 스크롤을 1회만 동작시키기 위한 플래그
        };

        /**
         * Application Logic
         */
        window.app = {
            unsubscribePosts: null, 

            initFirebase: async function() {
                if (!window.firebaseModules) {
                    setTimeout(() => this.initFirebase(), 100);
                    return;
                }

                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore } = window.firebaseModules;

                const firebaseConfig = {
                    apiKey: "AIzaSyDe1mpaPcDfiNG63peU7EFNXXNJQmKc2rM",
                    authDomain: "taegukdo-notice.firebaseapp.com",
                    projectId: "taegukdo-notice",
                    storageBucket: "taegukdo-notice.firebasestorage.app",
                    messagingSenderId: "322790351041",
                    appId: "1:322790351041:web:aa43db9559a99792d3f440"
                };

                try {
                    const firebaseApp = initializeApp(firebaseConfig);
                    const auth = getAuth(firebaseApp);
                    state.auth = auth;
                    state.db = getFirestore(firebaseApp);

                    signInAnonymously(auth).catch((error) => {
                        console.log("익명 로그인 안내 (Firebase 콘솔에서 활성화 필요 없음, 읽기 전용 작동):", error.message);
                    });

                    onAuthStateChanged(auth, (user) => {
                        state.user = user;
                        state.isAdmin = !!user && !user.isAnonymous;
                        this.subscribeToPosts();
                    });

                } catch (error) {
                    console.error("Firebase Init Error:", error);
                    this.stopLoading();
                    this.showToast("데이터 연결에 실패했습니다.", 'error');
                }
            },

            getCollectionRef: function() {
                const { collection } = window.firebaseModules;
                return collection(state.db, 'posts');
            },

            getDocRef: function(id) {
                const { doc } = window.firebaseModules;
                return doc(state.db, 'posts', id);
            },

            subscribeToPosts: function() {
                const { onSnapshot, query } = window.firebaseModules;
                if (!state.db) return;

                if (this.unsubscribePosts) {
                    this.unsubscribePosts();
                }

                const postsRef = this.getCollectionRef();
                const q = query(postsRef);

                this.unsubscribePosts = onSnapshot(q, (snapshot) => {
                    const loadedPosts = [];
                    snapshot.forEach((doc) => {
                        loadedPosts.push({ id: doc.id, ...doc.data() });
                    });

                    loadedPosts.sort((a, b) => {
                        if (a.isMustRead && !b.isMustRead) return -1;
                        if (!a.isMustRead && b.isMustRead) return 1;
                        const timeA = a.timestamp?.toMillis ? a.timestamp.toMillis() : (new Date(a.date).getTime() || 0);
                        const timeB = b.timestamp?.toMillis ? b.timestamp.toMillis() : (new Date(b.date).getTime() || 0);
                        return timeB - timeA;
                    });

                    // ID 파라미터 체크 로직 개선 (검색어보다 우선)
                    const params = new URLSearchParams(window.location.search);
                    const keyword = params.get('search');
                    let targetId = params.get('id');
                    
                    if (!targetId && window.location.hash) {
                        targetId = window.location.hash.substring(1).replace(/^post-/, '');
                    }
                    
                    // targetId(특정 게시물 열람)가 명시되지 않고, 검색어만 있을 경우에 한해서 상세 뷰 자동 오픈
                    if (keyword && !targetId && state.isLoading) {
                        const matchedPost = loadedPosts.find(p => 
                            (p.title && p.title.includes(keyword)) || 
                            (p.content && p.content.includes(keyword))
                        );
                        
                        if (matchedPost) {
                            state.selectedPostId = matchedPost.id;
                            state.viewMode = matchedPost.isArchived ? 'archived' : 'current';
                        }
                    }

                    if (!state.isLoading && loadedPosts.length > state.posts.length) {
                        this.showToast("🔔 새로운 공지사항이 도착했습니다!");
                    }

                    state.posts = loadedPosts;
                    this.stopLoading();
                    this.renderApp();

                }, (error) => {
                    console.error("Firestore Listen Error:", error);
                    this.stopLoading();
                    this.showToast("데이터를 불러올 수 없습니다. 데이터베이스 권한 설정을 확인해주세요.", 'error');
                });
            },

            stopLoading: function() {
                state.isLoading = false;
                const loader = document.getElementById('initial-loader');
                if (loader) loader.classList.add('hidden');
            },

            submitPost: async function() {
                const { addDoc, serverTimestamp } = window.firebaseModules;
                
                const title = document.getElementById('title-input').value;
                const content = document.getElementById('content-input').value;
                const isMustRead = document.getElementById('must-read-check').checked;

                if (!title.trim() || !content.trim()) {
                    this.showToast("제목과 내용을 모두 입력해주세요.", 'error');
                    return;
                }

                const today = new Date();
                const dateString = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;

                try {
                    const postsRef = this.getCollectionRef();
                    
                    const postData = {
                        title: title,
                        content: content,
                        date: dateString,
                        timestamp: serverTimestamp(),
                        isArchived: false,
                        isMustRead: isMustRead
                    };

                    if (state.currentImageDataUrl) {
                        postData.imageUrl = state.currentImageDataUrl;
                    }

                    await addDoc(postsRef, postData);

                    this.showToast(isMustRead ? "중요 필독 공지가 등록되었습니다." : "새로운 공지사항이 등록되었습니다.");
                    state.viewMode = 'current';
                    this.closeModal();

                } catch (e) {
                    console.error(e);
                    if(e.code === 'permission-denied') {
                        this.showToast("권한이 없습니다. 관리자 로그인을 확인해주세요.", 'error');
                    } else {
                        this.showToast("저장 실패: " + e.message, 'error');
                    }
                }
            },

            confirmDelete: async function() {
                const { deleteDoc } = window.firebaseModules;
                if (!state.deleteTargetId) return;
                try {
                    const postRef = this.getDocRef(state.deleteTargetId);
                    await deleteDoc(postRef);
                    if (state.selectedPostId === state.deleteTargetId) state.selectedPostId = null;
                    this.showToast("게시글이 안전하게 삭제되었습니다.");
                    this.closeModal();
                } catch (e) {
                    console.error(e);
                    this.showToast("삭제 권한이 없거나 실패했습니다.", 'error');
                }
            },

            toggleArchive: async function(id) {
                const { updateDoc } = window.firebaseModules;
                const post = state.posts.find(p => p.id === id);
                if (!post) return;
                const newStatus = !post.isArchived;
                try {
                    const postRef = this.getDocRef(id);
                    await updateDoc(postRef, { isArchived: newStatus });
                    this.showToast(newStatus ? "보관함으로 이동되었습니다." : "공지사항으로 복원되었습니다.");
                    if (newStatus && state.viewMode === 'current' && state.selectedPostId) state.selectedPostId = null;
                    if (!newStatus && state.viewMode === 'archived' && state.selectedPostId) state.selectedPostId = null;
                } catch (e) {
                    console.error(e);
                    this.showToast("권한 부족으로 상태 변경 실패", 'error');
                }
            },

            handleImageSelect: function(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000;
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        state.currentImageDataUrl = dataUrl;

                        document.getElementById('image-preview').src = dataUrl;
                        document.getElementById('image-preview-container').classList.remove('hidden');
                        document.getElementById('remove-image-btn').classList.remove('hidden');
                    };
                };
            },

            removeSelectedImage: function() {
                state.currentImageDataUrl = null;
                document.getElementById('image-input').value = "";
                document.getElementById('image-preview').src = "";
                document.getElementById('image-preview-container').classList.add('hidden');
                document.getElementById('remove-image-btn').classList.add('hidden');
            },

            isNewPost: function(post) {
                if (!post.timestamp) {
                    const postDate = new Date(post.date);
                    const diff = Date.now() - postDate.getTime();
                    return diff < (3 * 24 * 60 * 60 * 1000); 
                }
                const postMillis = post.timestamp.toMillis ? post.timestamp.toMillis() : Date.now();
                const diff = Date.now() - postMillis;
                return diff < (3 * 24 * 60 * 60 * 1000); 
            },

            init: function() {
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && state.modalType) this.closeModal();
                    if (e.ctrlKey && e.key === 'q') this.toggleAdmin();
                });
                
                if (window.firebaseModules) {
                    this.initFirebase();
                }
            },

            renderApp: function() {
                this.renderMainContent();
                this.renderFooterIcon();
                this.renderModal();
                if(window.lucide) window.lucide.createIcons();
                this.applySearchHighlight();
            },

            renderMainContent: function() {
                const mainEl = document.getElementById('main-content');
                if (state.isLoading) return; 

                if (state.selectedPostId !== null) {
                    this.renderDetailView(mainEl);
                } else {
                    this.renderListView(mainEl);
                }
            },

            renderDetailView: function(container) {
                const post = state.posts.find(p => p.id === state.selectedPostId);
                if (!post) { state.selectedPostId = null; return this.renderApp(); }
                
                let imageHtml = '';
                if (post.imageUrl) {
                    imageHtml = `
                        <div class="mb-8 rounded-2xl overflow-hidden bg-stone-50 border border-stone-100 flex justify-center py-4 px-2">
                            <img src="${post.imageUrl}" alt="첨부 이미지" class="max-h-[600px] max-w-full object-contain rounded-lg shadow-sm">
                        </div>
                    `;
                }

                container.innerHTML = `
                    <div class="h-full flex flex-col animate-fade-in pb-12">
                        <!-- 툴바 -->
                        <div class="flex justify-between items-center mb-8 border-b border-stone-200 pb-6">
                            <button onclick="app.goList()" class="group flex items-center gap-2 text-stone-500 hover:text-k-text transition font-sans font-bold text-lg">
                                <span class="bg-stone-100 group-hover:bg-theme-light group-hover:text-theme-color p-2 rounded-full transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></span>
                                목록으로
                            </button>
                            
                            ${state.isAdmin ? `
                                <div class="flex gap-2 md:gap-3 flex-wrap justify-end">
                                    <button onclick="app.openEditModal('${post.id}')" class="px-3 md:px-4 py-2 bg-stone-100 hover:bg-stone-200 text-stone-600 rounded-lg transition font-bold flex items-center gap-2 font-sans text-sm">
                                        <i data-lucide="edit" class="w-4 h-4"></i> 수정
                                    </button>
                                    <button onclick="app.toggleArchive('${post.id}')" class="px-3 md:px-4 py-2 bg-stone-100 hover:bg-stone-200 text-stone-600 rounded-lg transition font-bold flex items-center gap-2 font-sans text-sm">
                                        <i data-lucide="${post.isArchived ? 'refresh-ccw' : 'archive'}" class="w-4 h-4"></i> ${post.isArchived ? "복원" : "보관"}
                                    </button>
                                    <button onclick="app.requestDelete('${post.id}')" class="px-3 md:px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg transition font-bold flex items-center gap-2 font-sans text-sm">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i> 삭제
                                    </button>
                                </div>
                            ` : ''}
                        </div>

                        <!-- 제목 및 정보 -->
                        <div class="mb-10">
                            <div class="flex flex-wrap items-center gap-3 mb-4">
                                ${post.isMustRead && !post.isArchived ? 
                                    `<span class="bg-theme-light text-theme-color px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-1.5 font-sans border border-theme-color/20">
                                        <i data-lucide="megaphone" class="w-4 h-4 fill-current"></i> 필독
                                     </span>` : ''}
                                ${post.isArchived ? `<span class="bg-stone-100 text-stone-500 px-3 py-1.5 rounded-full text-sm font-bold font-sans">보관됨</span>` : ''}
                                <span class="bg-stone-50 text-stone-500 px-3 py-1.5 rounded-full text-sm font-bold flex items-center gap-1.5 font-sans border border-stone-200">
                                    <i data-lucide="calendar" class="w-4 h-4"></i> ${post.date}
                                </span>
                            </div>
                            <h2 class="text-3xl md:text-4xl font-serif font-bold text-k-text leading-tight break-keep">${post.title}</h2>
                        </div>

                        <!-- 본문 -->

            showToast: function(message, type = 'success') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                
                const bgColor = type === 'error' ? 'bg-theme-color' : 'bg-k-text';
                const icon = type === 'error' ? 'alert-circle' : 'check-circle-2';
                
                toast.className = "fixed top-8 left-1/2 transform -translate-x-1/2 z-[100] animate-slide-down shadow-2xl w-[90%] md:w-auto text-center";
                toast.innerHTML = `
                    <div class="${bgColor} text-white px-8 py-4 rounded-full inline-flex items-center justify-center gap-3 font-sans text-base font-bold border-2 border-white/20 shadow-lg">
                        <i data-lucide="${icon}" class="w-5 h-5 text-white flex-shrink-0"></i> 
                        <span class="break-keep">${message}</span>
                    </div>
                `;
                
                container.appendChild(toast);
                if(window.lucide) window.lucide.createIcons();

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translate(-50%, -20px)';
                    toast.style.transition = 'all 0.3s ease-out';
                    setTimeout(() => toast.remove(), 300);
                }, 4000); 
            },

            submitLogin: async function() {
                const { signInWithEmailAndPassword } = window.firebaseModules;
                
                const emailInput = document.getElementById('email-input');
                const pwInput = document.getElementById('pw-input');
                
                const email = emailInput.value.trim();
                const password = pwInput.value;
                
                if (!email || !password) {
                    this.showToast("이메일과 비밀번호를 모두 입력해주세요.", 'error');
                    return;
                }

                try {
                    await signInWithEmailAndPassword(state.auth, email, password);
                    
                    this.showToast("관리자 모드로 전환되었습니다.");
                    this.closeModal();
                } catch (error) {
                    console.error("로그인 에러:", error);
                    
                    const container = emailInput.parentElement.parentElement;
                    container.classList.remove('animate-shake');
                    void container.offsetWidth;
                    container.classList.add('animate-shake');
                    
                    emailInput.classList.add('border-theme-color', 'text-theme-color');
                    pwInput.classList.add('border-theme-color', 'text-theme-color');
                    
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                        this.showToast("계정 정보가 일치하지 않습니다. Firebase 콘솔을 확인해주세요.", 'error');
                    } else if (error.code === 'auth/invalid-email') {
                        this.showToast("유효하지 않은 이메일 형식입니다.", 'error');
                    } else {
                        this.showToast("인증 실패: " + error.message, 'error');
                    }
                    
                    setTimeout(() => {
                        emailInput.classList.remove('border-theme-color', 'text-theme-color');
                        pwInput.classList.remove('border-theme-color', 'text-theme-color');
                        pwInput.value = '';
                    }, 1500);
                }
            },
            
            requestDelete: function(id) {
                state.deleteTargetId = id;
                this.openModal('delete');
            },

            submitEdit: async function() {
                const { updateDoc } = window.firebaseModules;
                
                const title = document.getElementById('title-input').value;
                const content = document.getElementById('content-input').value;
                const isMustRead = document.getElementById('must-read-check').checked;

                if (!title.trim() || !content.trim()) {
                    this.showToast("제목과 내용을 모두 입력해주세요.", 'error');
                    return;
                }

                try {
                    const postRef = this.getDocRef(state.editTargetId);
                    
                    const updateData = {
                        title: title,
                        content: content,
                        isMustRead: isMustRead
                    };

                    if (state.currentImageDataUrl) {
                        updateData.imageUrl = state.currentImageDataUrl;
                    } else if (state.currentImageDataUrl === null && document.getElementById('image-preview').src === "") {
                        const { deleteField } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                        updateData.imageUrl = deleteField();
                    }

                    await updateDoc(postRef, updateData);

                    this.showToast("게시글이 성공적으로 수정되었습니다.");
                    this.closeModal();

                } catch (e) {
                    console.error(e);
                    this.showToast("수정 권한이 없거나 실패했습니다.", 'error');
                }
            },

            applySearchHighlight: function() {
                const params = new URLSearchParams(window.location.search);
                const keyword = params.get('search');
                let targetId = params.get('id');
                
                // 해시에서 특정 게시글 ID 추출 로직 (#post-아이디 또는 #아이디)
                if (!targetId && window.location.hash) {
                    targetId = window.location.hash.substring(1).replace(/^post-/, '');
                }

                let isScrolledByTarget = false;

                // 1. 특정 게시글 ID가 있을 경우 해당 게시물로 먼저 스크롤 이동 및 테두리 효과
                if (targetId && !state._initialScrollDone && !state.selectedPostId) {
                    const targetElement = document.getElementById(`post-${targetId}`);
                    if (targetElement) {
                        setTimeout(() => {
                            targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            
                            // 시각적 강조 효과 클래스 추가
                            targetElement.classList.add('highlight-target');
                            
                            // 2초 뒤 클래스 제거 (재사용 가능하도록)
                            setTimeout(() => {
                                targetElement.classList.remove('highlight-target');
                            }, 2000);
                        }, 100); // 렌더링 직후 이동 보장
                        
                        isScrolledByTarget = true;
                        state._initialScrollDone = true; 
                    }
                }

                // 2. 검색어 텍스트 매칭 및 하이라이트
                if (!keyword) return;

                const contentArea = document.getElementById('post-content-area') || document.getElementById('main-content');
                if(!contentArea) return;

                const walk = document.createTreeWalker(contentArea, NodeFilter.SHOW_TEXT, null, false);
                let node;
                const textNodes = [];
                
                while (node = walk.nextNode()) {
                    const parentName = node.parentNode.nodeName;
                    if (!['SCRIPT', 'STYLE', 'MARK', 'TEXTAREA', 'INPUT', 'BUTTON'].includes(parentName)) {
                        textNodes.push(node);
                    }
                }
                
                let found = false;
                textNodes.forEach(textNode => {
                    if (textNode.nodeValue.includes(keyword)) {
                        const span = document.createElement('span');
                        const regex = new RegExp(`(${keyword})`, 'gi');
                        span.innerHTML = textNode.nodeValue.replace(regex, '<mark class="search-highlight">$1</mark>');
                        textNode.parentNode.replaceChild(span, textNode);
                        found = true;
                    }
                });

                // 특정 게시물로의 스크롤이 발생하지 않은 경우에만 검색어 스크롤 적용
                if (found && !isScrolledByTarget && !state._initialScrollDone) {
                    setTimeout(() => {
                        const firstMark = document.querySelector('mark.search-highlight');
                        if (firstMark) {
                            firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            state._initialScrollDone = true; 
                        }
                    }, 50);
                }
            }
        };

        // DOM 로드 시 초기화
        window.addEventListener('DOMContentLoaded', () => {
            window.app.init();
        });
    </script>
</body>
</html>
